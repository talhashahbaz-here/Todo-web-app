<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBITD</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>
    <main>
        <div id='side-bar' class="grid-item">
            <dialog id="folder-modal">
                <form id="folder-form">
                    <label for="folderName">Enter Folder Name</label>
                    <input type="text" name="folderName" id="folderName" placeholder="e.g. Gym" required>
                    <button id="add-folder-submit" class="btn">Add</button>
                </form>
            </dialog>
            <button id="add-folder" class="btn">Add Folder</button>
            <ul id="all-folders">
                <!-- <li class="folder">Default Folder</li>
                <li class="folder  folder-selected">Work <span id="delete-btn"><i class="fa-solid fa-trash"></i></span>
                </li>
                <li class="folder">Groceries <span id="delete-btn"><i class="fa-solid fa-trash"></i></span></li> -->
            </ul>
        </div>
        <div class="grid-item content-window">
            <div id="header" class="hidden">
                <h1 id="current-active-folder">Default Folder</h1>
                <div class="header-button-group">
                    <button id="delete-folder-btn" class="btn">Delete Folder</button>
                    <button id="add-task-btn" class="btn">Add Task</button>
                </div>
            </div>
            <h2 id="tip-heading">Select a Folder</h2>
            <div id="task-container">
                <!-- <div class="task-item">

                    <div class="task-info">
                        <h2>Title</h2>
                        <p>description</p>
                        <p>due Date</p>
                    </div>

                    <div class="button-group">
                        <button class="btn" id="btn-complete">Mark Complete</button>
                        <button class="btn" id="btn-task-delete">Delete Task</button>
                    </div>
                </div> -->

                
            </div>

            <dialog id="task-modal">
                <form id="task-form">
                    <label for="task-title">Enter Title</label>
                    <input type="text" name="task-title" id="task-title" placeholder="Assignment" required>
                    <label for="task-description">Enter Description</label>
                    <textarea type="text" name="task-description" id="task-description" rows="4" cols="20"
                        required></textarea>
                    <label for="task-due-date">Enter Due Date</label>
                    <input type="date" name="task-due-date" id="task-due-date" required>
                    <label for="taskPriority">Priority</label>
                    <div class="radio-group">
                        <label for="high-priority">High</label>
                        <input type="radio" name="taskPriority" id="high-priority" value="highPriority" required>
                    </div>
                    <div class="radio-group">
                        <label for="medium-priority">Medium</label>
                        <input type="radio" name="taskPriority" id="medium-priority" value="mediumPriority" required>
                    </div>
                    <div class="radio-group">
                        <label for="low-priority">Low</label>
                        <input type="radio" name="taskPriority" id="low-priority" value="lowPriority" required>
                    </div>
                    <button id="add-task-submit" class="btn">Add Task</button>
                </form>
            </dialog>
        </div>
    </main>
</body>

</html>
